            const [selectedWords, setSelectedWords] = useState([]);
            const [scores, setScores] = useState({ tsukasa: 0, akito: 0, touya: 0, rui: 0 });
            const [hints, setHints] = useState(false);
            const [notebookBg, setNotebookBg] = useState(() => NOTEBOOKS.tsukasa);
            const [currentWordOptions, setCurrentWordOptions] = useState([]);
            const [penHover, setPenHover] = useState(false);
            const [buttonHover, setButtonHover] = useState(false);
            
            // Dialogue Queue system
            const [winningCharId, setWinningCharId] = useState('tsukasa');
            const [dialogueQueue, setDialogueQueue] = useState([]);
            const [dialogueIndex, setDialogueIndex] = useState(0);
            const [typingText, setTypingText] = useState("");
            const [reactionStates, setReactionStates] = useState({ tsukasa: false, rui: false, akito: false, touya: false });
            const [soundEnabled, setSoundEnabled] = useState(false);
            const [isChoiceActive, setIsChoiceActive] = useState(false);
            
            const [fadeProgress, setFadeProgress] = useState('none');
            
            const [scale, setScale] = useState(1);
            const [isPortrait, setIsPortrait] = useState(false);

            const selectSfxRef = useRef(null);
            const bgmRef = useRef(null);
            const typingTimer = useRef(null);

            useEffect(() => {
                const handleResize = () => {
                    const targetWidth = 1080;
                    const targetHeight = 720;
                    const scaleX = (window.innerWidth - 10) / targetWidth;
                    const scaleY = (window.innerHeight - 10) / targetHeight;
                    const finalScale = Math.min(scaleX, scaleY, 1.2);
                    setScale(finalScale);
                    setIsPortrait(window.innerHeight > window.innerWidth && window.innerWidth < 768);
                };
                window.addEventListener('resize', handleResize);
                window.addEventListener('orientationchange', handleResize);
                handleResize();
                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('orientationchange', handleResize);
                };
            }, []);

            const generateNewWordOptions = () => {
                const tsukasaWords = WORD_POOL.filter(w => w.tsukasa > 0);
                const ruiWords = WORD_POOL.filter(w => w.rui > 0);
                const akitoWords = WORD_POOL.filter(w => w.akito > 0);
                const touyaWords = WORD_POOL.filter(w => w.touya > 0);

                const selected = [];
                
                const pushUniqueFrom = (arr) => {
                    const available = arr.filter(w => !selected.some(s => s.word === w.word));
                    if (available.length > 0) {
                        const chosen = available[Math.floor(Math.random() * available.length)];
                        selected.push(chosen);
                    }
                };

                // Guarantee at least one choice exists for each person on the notebook page
                pushUniqueFrom(tsukasaWords);
                pushUniqueFrom(ruiWords);
                pushUniqueFrom(akitoWords);
                pushUniqueFrom(touyaWords);

                // Fill remaining up to 10 choices dynamically
                while (selected.length < 10) {
                    const available = WORD_POOL.filter(w => !selected.some(s => s.word === w.word));
                    if (available.length === 0) break;
                    const chosen = available[Math.floor(Math.random() * available.length)];
                    selected.push(chosen);
                }

                // Shuffle selections
                setCurrentWordOptions(selected.sort(() => 0.5 - Math.random()));
            };

            useEffect(() => {
                generateNewWordOptions();
            }, []);

            // Handle background soundtrack play-pause state safely
            useEffect(() => {
                if (bgmRef.current) {
                    if (soundEnabled) {
                        bgmRef.current.play().catch(err => console.log("Audio load waiting for click context:", err));
                    } else {
                        bgmRef.current.pause();
                    }
                }
            }, [soundEnabled]);

            useEffect(() => {
                return () => {
                    if (typingTimer.current) clearInterval(typingTimer.current);
                };
            }, []);

            const playSelectSound = () => {
                if (selectSfxRef.current) {
                    selectSfxRef.current.currentTime = 0;
                    selectSfxRef.current.play().catch(e => console.log("Select audio blocked:", e));
                }
            };

            // STREAMING_CHUNK: Handling word selection logic and double chibi bouncy jump assignments
            const handleWordClick = (wordObj) => {
                if (selectedWords.length >= 20) return;

                // Auto-trigger sound player on first word selection if user hasn't explicitly muted
                if (!soundEnabled && bgmRef.current) {
                    setSoundEnabled(true);
                }

                playSelectSound();

                // Determine favorite character for jump response
                const values = { tsukasa: wordObj.tsukasa, rui: wordObj.rui, akito: wordObj.akito, touya: wordObj.touya };
                const maxPoints = Math.max(...Object.values(values));
                
                // Collect candidates sharing the highest points (must be greater than 0)
                const candidates = Object.keys(values).filter(key => values[key] === maxPoints && maxPoints > 0);
                
                let favorite = 'tsukasa';
                if (candidates.length > 0) {
                    // Randomly select one candidate from the tied winners to jump!
                    favorite = candidates[Math.floor(Math.random() * candidates.length)];
                }

                // Double bounce reaction
                setReactionStates(prev => ({ ...prev, [favorite]: true }));
                setTimeout(() => {
                    setReactionStates(prev => ({ ...prev, [favorite]: false }));
                }, 600);

                // Add points
                setScores(prev => ({
                    tsukasa: prev.tsukasa + wordObj.tsukasa,
                    rui: prev.rui + wordObj.rui,
                    akito: prev.akito + wordObj.akito,
                    touya: prev.touya + wordObj.touya
                }));

                const nextSelected = [...selectedWords, wordObj.word];
                setSelectedWords(nextSelected);

                if (nextSelected.length < 20) {
                    generateNewWordOptions();
                } else {
                    // Trigger fade-to-black directly to visual novel
                    setTimeout(() => {
                        let finalWinner = 'tsukasa';
                        let maxWinnerScore = -1;
                        const finalScores = {
                            tsukasa: scores.tsukasa + wordObj.tsukasa,
                            rui: scores.rui + wordObj.rui,
                            akito: scores.akito + wordObj.akito,
                            touya: scores.touya + wordObj.touya
                        };

                        Object.keys(finalScores).forEach(charKey => {
                            if (finalScores[charKey] > maxWinnerScore) {
                                maxWinnerScore = finalScores[charKey];
                                finalWinner = charKey;
                            }
                        });

                        setWinningCharId(finalWinner);
                        
                        // Construct direct linear dialogue queue
                        const introSteps = CHARACTERS[finalWinner].dialogues.map(d => ({
                            speaker: CHARACTERS[finalWinner].name,
                            text: d.text,
                            expression: d.expression
                        }));

                        setDialogueQueue(introSteps);
                        setDialogueIndex(0);
                        setIsChoiceActive(false);
                        
                        setFadeProgress('out');
                        setTimeout(() => {
                            setGameState('DIALOGUE');
                            setFadeProgress('in');
                            setTimeout(() => setFadeProgress('none'), 800);
                        }, 800);

                    }, 700);
                }
            };

            const handlePenToggleClick = () => {
                playSelectSound();
                setHints(!hints);
            };

            const currentStep = useMemo(() => {
                if (gameState !== 'DIALOGUE') return null;
                return dialogueQueue[dialogueIndex];
            }, [gameState, dialogueQueue, dialogueIndex]);

            // STREAMING_CHUNK: Processing standard typewriter styling output and text layouts
            useEffect(() => {
                if (!currentStep || isChoiceActive) return;
                
                let isMounted = true;
                setTypingText("");
                let index = 0;
                const fullText = currentStep.text;

                if (typingTimer.current) clearInterval(typingTimer.current);

                typingTimer.current = setInterval(() => {
                    if (!isMounted) return;
                    index++;
                    setTypingText(fullText.slice(0, index));
                    
                    if (index >= fullText.length) {
                        clearInterval(typingTimer.current);
                    }
                }, 20);

                return () => {
                    isMounted = false;
                    if (typingTimer.current) clearInterval(typingTimer.current);
                };
            }, [currentStep, dialogueIndex, isChoiceActive]);

            const handleDialogueNext = () => {
                playSelectSound();

                if (isChoiceActive) return;

                const currentText = currentStep?.text || "";
                if (typingText.length < currentText.length) {
                    setTypingText(currentText);
                    if (typingTimer.current) clearInterval(typingTimer.current);
                    return;
                }

                if (dialogueIndex + 1 < dialogueQueue.length) {
                    setDialogueIndex(dialogueIndex + 1);
                } else {
                    const hasChoices = CHARACTERS[winningCharId].choices && CHARACTERS[winningCharId].choices.length > 0;
                    const choiceAlreadySelected = dialogueQueue.some(d => d.speaker === "You");

                    if (hasChoices && !choiceAlreadySelected) {
                        setIsChoiceActive(true);
                    } else {
                        // Fade to black transition directly to ending
                        setFadeProgress('out');
                        setTimeout(() => {
                            setGameState('ENDING');
                            setFadeProgress('in');
                            setTimeout(() => setFadeProgress('none'), 800);
                        }, 800);
                    }
                }
            };

            const handleChoiceSelect = (choice) => {
                playSelectSound();
                
                setScores(prev => ({ ...prev, [winningCharId]: prev[winningCharId] + choice.scoreMod }));
                setIsChoiceActive(false);

                // Append Player spoken line and Character reply dynamically to the flat queue
                const updatedQueue = [
                    ...dialogueQueue,
                    {
                        speaker: "You",
                        text: choice.fullResponse,
                        expression: "think"
                    },
                    {
                        speaker: CHARACTERS[winningCharId].name,
                        text: choice.reply,
                        expression: choice.replyExpression
                    }
                ];

                setDialogueQueue(updatedQueue);
                // Advance dialogue step straight to the player response step
                setDialogueIndex(dialogueQueue.length);
            };

            const handleRestart = () => {
                playSelectSound();
                setSelectedWords([]);
                setScores({ tsukasa: 0, akito: 0, touya: 0, rui: 0 });
                setNotebookBg(NOTEBOOKS[Math.floor(Math.random() * NOTEBOOK_ARRAY.length)] || NOTEBOOKS.tsukasa);
                generateNewWordOptions();
                
                // Fade back into the playing state
                setFadeProgress('out');
                setTimeout(() => {
                    setGameState('PLAYING');
                    setFadeProgress('in');
                    setTimeout(() => setFadeProgress('none'), 800);
                }, 800);
            };

            // STREAMING_CHUNK: Calculating CSS style properties and gradients for hint markers
            const getWordStyle = (wordObj) => {
                if (!hints) {
                    return { color: '#27272a' };
                }

                const likedBy = [];
                if (wordObj.tsukasa > 0) likedBy.push('#ffbb00');
                if (wordObj.rui > 0) likedBy.push('#bb88ee');
                if (wordObj.akito > 0) likedBy.push('#ff7722');
                if (wordObj.touya > 0) likedBy.push('#0077dd');

                if (likedBy.length === 0) {
                    return { color: '#27272a' };
                } else if (likedBy.length === 1) {
                    return { color: likedBy[0], fontWeight: 'bold' };
                } else {
                    // Multi-character text gradients using specified image colors
                    const gradientString = `linear-gradient(135deg, ${likedBy.join(', ')})`;
                    return {
                        backgroundImage: gradientString,
                        WebkitBackgroundClip: 'text',
                        WebkitTextFillColor: 'transparent',
                        MozBackgroundClip: 'text',
                        MozTextFillColor: 'transparent',
                        fontWeight: 'bold',
                        display: 'inline-block'
                    };
                }
            };

            // STREAMING_CHUNK: Rendering the layout templates and wrapping them inside scalable bounds
            return (
                <div className={`desk-bg ${gameState === 'DIALOGUE' ? 'vn-active' : ''}`}>
                    {/* Audio elements */}
                    <audio 
                        ref={selectSfxRef} 
                        src="https://raw.githubusercontent.com/Asiandra/comfort-characters/main/MISC/DDSF%20Select.ogg" 
                        preload="auto" 
                    />
                    <audio 
                        ref={bgmRef} 
                        src="https://raw.githubusercontent.com/Asiandra/dokidokifantasistasquad-menu/main/Stuff/Dreams%20Of%20Love%20and%20Literature.mp3" 
                        preload="auto" 
                        loop 
                    />

                    {/* Cinematic Fade Transition overlay */}
                    <div 
                        className="fixed inset-0 bg-black z-[999] pointer-events-none transition-opacity duration-700"
                        style={{
                            opacity: (fadeProgress === 'out' || fadeProgress === 'black') ? 1 : 0,
                            visibility: fadeProgress === 'none' ? 'hidden' : 'visible'
                        }}
                    />

                    <div 
                        style={{
                            width: '1080px',
                            height: '720px',
                            transform: `translate(-50%, -50%) scale(${scale})`,
                            transformOrigin: 'center center',
                            position: 'absolute',
                            left: '50%',
                            top: '50%',
                        }}
                        className="select-none flex items-center justify-center overflow-hidden"
                    >
                        {/* Audio Toggle sitting off-notebook on the wood desk */}
                        {gameState !== 'DIALOGUE' && (
                            <button 
                                onClick={() => { playSelectSound(); setSoundEnabled(!soundEnabled); }}
                                className="absolute bottom-4 right-10 z-50 bg-white/95 p-3 rounded-full transition-all shadow-lg text-rose-500 flex items-center justify-center border border-rose-100 hover:scale-110"
                                title={soundEnabled ? "Mute Music" : "Play Music"}
                            >
                                {soundEnabled ? <SVG_VOLUME_ON /> : <SVG_VOLUME_OFF />}
                            </button>
                        )}

                        {/* Interactive Hint Pen sitting off-notebook on the wood desk */}
                        {gameState === 'PLAYING' && (
                            <button 
                                onClick={handlePenToggleClick}
                                onMouseEnter={() => setPenHover(true)}
                                onMouseLeave={() => setPenHover(false)}
                                className="absolute top-4 right-10 z-50 transition-transform duration-150 cursor-pointer"
                            >
                                <img 
                                    src={penHover ? "https://i.postimg.cc/W37NGsWt/pen-select.png" : "https://i.postimg.cc/hj0DLKyj/pen.png"} 
                                    alt="Hint Pen" 
                                    className="w-[180px] object-contain drop-shadow-md" 
                                />
                                <span className="absolute inset-0 flex items-center justify-center text-lg text-pink-600 mt-[-5px] tracking-wide font-bold font-omori">
                                    {hints ? "Hints: ON" : "Hints"}
                                </span>
                            </button>
                        )}

                        {/* WORKSPACE - MAIN BOOK INTERFACE */}
                        {gameState === 'PLAYING' && (
                            <div 
                                className="relative w-[90%] h-[92%] transition-all duration-300 rounded-sm font-omori" 
                                style={{ 
                                    backgroundImage: `url(${NOTEBOOKS.tsukasa})`, 
                                    backgroundSize: '100% 100%', 
                                    backgroundRepeat: 'no-repeat' 
                                }}
                            >
                                {/* LEFT PAGE - Chosen words and character chibis */}
                                <div className="absolute left-[6%] top-[10%] w-[40%] h-[85%] flex flex-col justify-between">
                                    <div className="w-full">
                                        <h2 className="text-3xl text-slate-800 font-extrabold uppercase tracking-widest pl-4 pt-2 border-b-2 border-slate-300/40 pb-1">
                                            CHOSEN WORDS
                                        </h2>
                                        
                                        {/* Scrollable list container */}
                                        <div className="grid grid-cols-2 gap-x-4 gap-y-3 text-2xl px-4 mt-3 max-h-[260px] overflow-y-auto custom-scrollbar">
                                            {selectedWords.map((word, i) => (
                                                <div key={i} className="text-slate-700 font-medium truncate">
                                                    {word}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Transparent chibi placement resting on bottom book margin */}
                                    <div className="absolute bottom-4 left-0 right-0 flex items-end justify-between px-2">
                                        {CHARACTER_ORDER.map(id => {
                                            const char = CHARACTERS[id];
                                            const isJumping = reactionStates[id];
                                            const imgSource = isJumping ? char.laughUrl : char.idleUrl;

                                            return (
                                                <div key={id} className="flex flex-col items-center relative flex-1">
                                                    <img 
                                                        src={imgSource} 
                                                        alt={char.name}
                                                        className={`w-[110px] h-[110px] object-contain transition-transform ${isJumping ? 'he-like' : ''}`} 
                                                    />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* RIGHT PAGE - Dynamic word choices matching ruler spacing */}
                                <div className="absolute right-[6%] top-[10%] w-[40%] h-[80%] flex flex-col justify-between">
                                    {/* Words chosen tracker */}
                                    <div className="text-right text-3xl text-slate-500 pr-10 pt-2 font-bold tracking-wider">
                                        {selectedWords.length}/20
                                    </div>

                                    {/* 10 dynamic vocab buttons matched flawlessly with the paper lines */}
                                    <div className="grid grid-cols-2 gap-x-12 gap-y-7 px-8 pb-[17%] mt-7 flex-grow items-center">
                                        {currentWordOptions.map((wordObj) => {
                                            return (
                                                <button 
                                                    key={wordObj.word}
                                                    onClick={() => handleWordClick(wordObj)}
                                                    className="text-left text-3xl transition-all duration-150 truncate word-btn"
                                                    style={getWordStyle(wordObj)}
                                                >
                                                    {wordObj.word}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* STREAMING_CHUNK: Formatting visual novel elements and absolute layering layouts */}
                        {/* DIALOGUE CLASSROOM SCREEN */}
                        {gameState === 'DIALOGUE' && (
                            <div 
                                className="absolute inset-0 w-full h-full bg-cover bg-center flex flex-col justify-end p-6 select-none"
                                style={{ backgroundImage: "url('https://i.postimg.cc/MK1dV84X/School-Classroom.png')" }}
                            >
                                {/* Standing Character Portrait scaled to fill the screen under the textbox */}
                                <div className="absolute inset-0 flex items-end justify-center pointer-events-none z-10 overflow-hidden">
                                    {currentStep && (
                                        <img 
                                            src={CHARACTERS[winningCharId].sprites[currentStep.expression] || CHARACTERS[winningCharId].sprites.talk} 
                                            alt={CHARACTERS[winningCharId].name}
                                            className="h-[92%] object-contain object-bottom transition-all duration-300 transform scale-105" 
                                        />
                                    )}
                                </div>

                                {/* Floating Ribbon Choices Overlay centered directly over character */}
                                {isChoiceActive && (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center space-y-4 z-40 bg-black/10">
                                        {CHARACTERS[winningCharId].choices.map((opt, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => handleChoiceSelect(opt)}
                                                className="w-[600px] h-[52px] border-2 border-pink-300/40 font-ddlc font-bold text-xl uppercase tracking-wider rounded-sm flex items-center justify-center cursor-pointer choice-ribbon"
                                            >
                                                {opt.text}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {/* Dating Sim Dialogue Textbox overlay */}
                                <div 
                                    className="relative mx-auto mb-2 w-[900px] h-[170px] z-20 flex flex-col justify-between p-6 select-none"
                                    style={{ 
                                        backgroundImage: "url('https://i.postimg.cc/TYfctXjB/Textbox.png')",
                                        backgroundSize: '100% 100%',
                                        backgroundRepeat: 'no-repeat'
                                    }}
                                >
                                    {/* Namebox Overlay */}
                                    <div 
                                        className="absolute top-0 left-8 -translate-y-[100%] w-[190px] h-[48px] flex items-center justify-center font-ddlc font-bold text-[#ba5599] text-2xl"
                                        style={{ 
                                            backgroundImage: "url('https://i.postimg.cc/L62VxMkw/Namebox.png')",
                                            backgroundSize: '100% 100%',
                                            backgroundRepeat: 'no-repeat'
                                        }}
                                    >
                                        <span className="pb-1">
                                            {currentStep ? currentStep.speaker : CHARACTERS[winningCharId].name}
                                        </span>
                                    </div>

                                    {/* Dialogue text block with padding right to prevent overlapping button */}
                                    <div className="pt-4 px-8 pr-28 flex-grow overflow-hidden">
                                        {!isChoiceActive && (
                                            <p className="text-slate-800 text-2xl font-semibold leading-normal font-ddlc">
                                                {typingText}
                                            </p>
                                        )}
                                        {isChoiceActive && (
                                            <p className="text-slate-400 text-xl italic leading-normal font-ddlc text-center">
                                                Please make a selection...
                                            </p>
                                        )}
                                    </div>

                                    {/* Next dialog transition trigger absolutely positioned to stay locked inside box */}
                                    {!isChoiceActive && (
                                        <button 
                                            onClick={handleDialogueNext}
                                            className="absolute bottom-5 right-8 z-30 px-5 py-1 bg-pink-400 hover:bg-pink-500 text-white rounded-lg text-lg font-bold font-ddlc transition-all shadow"
                                        >
                                            Next
                                        </button>
                                    )}
                                </div>

                                {/* Volume toggle overlay sitting natively in bottom corner during VN dialogue */}
                                <button 
                                    onClick={() => { playSelectSound(); setSoundEnabled(!soundEnabled); }}
                                    className="absolute bottom-4 right-10 z-50 bg-white/95 p-3 rounded-full transition-all shadow-lg text-rose-500 flex items-center justify-center border border-rose-100 hover:scale-110"
                                    title={soundEnabled ? "Mute Music" : "Play Music"}
                                >
                                    {soundEnabled ? <SVG_VOLUME_ON /> : <SVG_VOLUME_OFF />}
                                </button>
                            </div>
                        )}

                        {/* STREAMING_CHUNK: Designing the final notebook summary page with absolute inset scroll container positioning */}
                        {/* SUMMARY REVIEW ENDING - NO CONTAINER COLLAPSE */}
                        {gameState === 'ENDING' && (
                            <div 
                                className="relative w-[90%] h-[92%] transition-all duration-300 rounded-sm font-omori" 
                                style={{ 
                                    backgroundImage: `url(${NOTEBOOKS[winningCharId]})`, 
                                    backgroundSize: '100% 100%', 
                                    backgroundRepeat: 'no-repeat' 
                                }}
                            >
                                {/* LEFT PAGE - Polaroid and Review Details */}
                                <div className="absolute left-[6%] top-[10%] w-[40%] h-[85%] flex flex-col justify-between px-4">
                                    <div className="w-full">
                                        <h2 className="text-3xl text-slate-800 font-extrabold tracking-widest pt-2">
                                            Review
                                        </h2>
                                        <p className="text-2xl text-slate-600 font-bold mt-1">
                                            Route: {CHARACTERS[winningCharId].fullName}
                                        </p>
                                    </div>

                                    {/* Polaroid photo */}
                                    <div className="flex-grow flex items-center justify-center py-2">
                                        <div className="transform -rotate-3 transition-transform hover:rotate-0 duration-300">
                                            <img 
                                                src={CHARACTERS[winningCharId].endUrl} 
                                                alt={`${CHARACTERS[winningCharId].name} Memory`}
                                                className="w-[500px] object-contain shadow-xl border-[6px] border-white"
                                            />
                                        </div>
                                    </div>

                                    {/* Restrart */}
                                    <div className="pb-4 flex justify-center">
                                        <button 
                                            onClick={handleRestart}
                                            onMouseEnter={() => setButtonHover(true)}
                                            onMouseLeave={() => setButtonHover(false)}
                                            className="w-[280px] h-[55px] flex items-center justify-center font-ddlc font-bold text-2xl transition-all duration-200"
                                            style={{
                                                backgroundImage: `url(${buttonHover ? 'https://i.postimg.cc/D0rfnDMb/Button-Hover.png' : 'https://i.postimg.cc/SR6Qk5vY/Button.png'})`,
                                                backgroundSize: '100% 100%',
                                                backgroundRepeat: 'no-repeat',
                                                color: buttonHover ? '#ffaa99' : '#000000'
                                            }}
                                        >
                                            <span className="pb-1">Write another poem</span>
                                        </button>
                                    </div>
                                </div>

                                {/* RIGHT PAGE - Chosen Words and Affection Level */}
                                <div className="absolute right-[6%] top-[10%] w-[40%] h-[80%] flex flex-col px-4">
                                    {/* Affinity points block */}
                                    <div className="text-right text-3xl text-slate-800 font-extrabold pr-6 pt-2">
                                        Affinity: {scores[winningCharId]}
                                    </div>

                                    {/* Upgraded layout block using absolute coordinates to guarantee no height collapsible bugs */}
                                    <div className="w-full flex-1 mt-4 relative h-[320px] min-h-[320px]">
                                        <h3 className="text-2xl text-slate-800 font-extrabold pl-4 border-b border-slate-300/40 pb-1">
                                            Words Chosen
                                        </h3>
                                        
                                        {/* Simplified clean absolute container containing scrollable content safely */}
                                        <div className="absolute inset-x-0 bottom-0 top-[45px] overflow-y-auto px-4 py-2 custom-scrollbar">
                                            <div 
                                                className="grid grid-cols-2 gap-x-6 gap-y-4 text-xl md:text-2xl" 
                                                style={{ lineHeight: '1.6' }}
                                            >
                                                {selectedWords.map((word, index) => (
                                                    <div key={index} className="text-slate-700 font-medium truncate py-1">
                                                        ~ {word}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Initialize and Mount React Component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
